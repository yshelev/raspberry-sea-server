<!DOCTYPE html>
<head>
    <title>Azimut - Websocket</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: monospace;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
        }
        
        h1 {
            color: #4ade80;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: normal;
            letter-spacing: 1px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 8px 16px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            font-family: monospace;
            font-size: 13px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: rgba(0, 0, 0, 0.9);
            border-color: #4ade80;
            color: #4ade80;
        }
        
        .status {
            padding: 8px 16px;
            font-size: 13px;
            font-family: monospace;
            text-align: center;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
        }
        
        .status.connected {
            background: rgba(10, 92, 46, 0.9);
            color: #4ade80;
            border-color: #4ade80;
        }
        
        .status.disconnected {
            background: rgba(92, 10, 10, 0.9);
            color: #ff6b6b;
            border-color: #ff6b6b;
        }
        
        #messages {
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            height: 375px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 10px;
        }
        
        #messages::-webkit-scrollbar {
            width: 8px;
        }
        
        #messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        
        #messages::-webkit-scrollbar-thumb {
            background: rgba(74, 222, 128, 0.5);
            border-radius: 4px;
        }
        
        #messages::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 222, 128, 0.8);
        }
        
        .message {
            padding: 10px;
            margin: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            font-family: monospace;
        }
        
        .message strong {
            display: inline-block;
            margin-right: 10px;
            color: #aaa;
        }
        
        .message pre {
            margin: 5px 0 0 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: monospace;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Websocket Monitor</h1>
        
        <div class="top-bar">
            <div class="button-group">
                <button onclick="connect()">Connect</button>
                <button onclick="disconnect()">Disconnect</button>
                <button onclick="clearMessages()">Clear</button>
            </div>
            <div id="status" class="status disconnected">Disconnected</div>
        </div>
        
        <div id="messages"></div>
    </div>

    <script>
        let ws = null;
        let messageCounter = 0;
        
        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addMessage('system', 'already connected');
                return;
            }
            
            const wsUrl = `ws://localhost:8000/ws`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                const statusDiv = document.getElementById('status');
                statusDiv.className = 'status connected';
                statusDiv.textContent = 'Connected ✓';
                addMessage('system', 'connected to server');
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    messageCounter++;
                    
                    let displayText = JSON.stringify(data, null, 2);
                    
                    addMessage(data.type || 'data', displayText);
                } catch {
                    addMessage('data', event.data);
                    messageCounter++;
                }
            };
            
            ws.onerror = () => {
                addMessage('error', 'websocket error');
            };
            
            ws.onclose = () => {
                const statusDiv = document.getElementById('status');
                statusDiv.className = 'status disconnected';
                statusDiv.textContent = 'Disconnected ✗';
                addMessage('system', 'disconnected from server');
                ws = null;
            };
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
            } else {
                addMessage('system', 'no active connection');
            }
        }
        
        function addMessage(sender, text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            const timestamp = new Date().toLocaleTimeString();
            
            let formattedText = text;
            if (typeof text === 'string' && text.length > 500) {
                formattedText = text.substring(0, 500) + '...';
            }
            
            messageDiv.innerHTML = `<strong>[${timestamp}] ${sender}:</strong><pre>${escapeHtml(formattedText)}</pre>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            while (messagesDiv.children.length > 200) {
                messagesDiv.removeChild(messagesDiv.firstChild);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
            messageCounter = 0;
            addMessage('system', 'messages cleared');
        }
        
        window.onload = () => {
            setTimeout(connect, 1000);
        };
    </script>
</body>
