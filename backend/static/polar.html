<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polar Diagram Viewer</title>
    <link rel="stylesheet" href="static/polar.css">
    <link rel="icon" type="image/png" href="/static/favicon.png">
</head>
<body>
    <div class="container">
        <div class="polar-panel">
            <h3>
                📊 Polar Diagram
                <span class="status-indicator" id="connectionStatus">✗</span>
            </h3>
            <div class="image-container" id="imageContainer">
                <div class="loading-placeholder">
                    <div class="loading-spinner"></div>
                    <p>Waiting for polar diagram...</p>
                </div>
            </div>
            <div class="update-info" id="updateInfo">
                Last update: —
            </div>
        </div>

        <div class="nav-buttons">
            <button id="gotoDataBtn" class="nav-button">📡 Данные</button>
        </div>
    </div>

    <script src="static/polar.js"></script>
</body>
</html>
