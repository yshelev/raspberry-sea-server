<!DOCTYPE html>
<html>
  <head>
    <title>Azimut map</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <script src="https://api-maps.yandex.ru/v3/?apikey=1afe9174-eb51-47c6-b797-037a783e0873&lang=ru_RU"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: monospace;
      }
      #map {
        width: 100%;
        height: 100vh;
      }
      .data-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        padding: 15px;
        color: white;
        min-width: 230px;
        font-size: 13px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-family: monospace;
      }
      .data-panel h3 {
        margin: 0 0 10px 0;
        font-size: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        padding-bottom: 5px;
      }
      .data-panel .data-row {
        margin-bottom: 8px;
      }
      .data-panel .label {
        color: #aaa;
        display: inline-block;
        width: 80px;
      }
      .data-panel .value {
        color: #4ade80;
        font-weight: bold;
      }
      .status {
        position: absolute;
        top: 206px;
        left: 20px;
        z-index: 1000;
        padding: 8px 15px;
        backdrop-filter: blur(10px);
        border-radius: 10px;
        font-weight: bold;
        font-size: 14px;
        font-family: monospace;
        background: rgba(0, 0, 0, 0.8);
        color: white;
      }
      .radar-toggle {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 1000;
        padding: 10px 20px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-family: monospace;
        font-size: 14px;
        font-weight: bold;
        transition: all 0.3s;
      }
      .radar-toggle:hover {
        background: rgba(0, 0, 0, 0.9);
        border-color: #4ade80;
      }
      .radar-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: black;
        z-index: 500;
        display: none;
      }
      .radar-canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80vmin;
        height: 80vmin;
        border-radius: 50%;
        border: 2px solid #4ade80;
        background: rgba(0, 20, 0, 0.3);
        overflow: hidden;
      }
      .radar-sweep {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 50%;
        height: 2px;
        background: linear-gradient(90deg, rgba(74,222,128,0.8), rgba(74,222,128,0));
        transform-origin: 0% 50%;
        animation: sweep 4s linear infinite;
      }
      @keyframes sweep {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .radar-center {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 10px;
        height: 10px;
        background: #4ade80;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
      }
      .radar-points {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .radar-point {
        position: absolute;
        width: 8px;
        height: 8px;
        background: #ff4444;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: all 0.3s;
      }
      .radar-point.active {
        background: #ffff00;
        box-shadow: 0 0 10px #ffff00;
        width: 12px;
        height: 12px;
      }
      .radar-compass {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        padding: 10px;
        color: white;
        font-size: 12px;
        text-align: center;
        min-width: 60px;
      }
      .radar-bearing {
        position: absolute;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        padding: 10px;
        color: white;
        font-size: 14px;
        font-family: monospace;
      }
    </style>
  </head>

  <body>
    <div id="map" style="width: 100%; height: 100vh;"></div>
    
    <div class="radar-container" id="radarContainer">
      <div class="radar-canvas" id="radarCanvas">
        <div class="radar-sweep"></div>
        <div class="radar-center"></div>
        <div class="radar-points" id="radarPoints"></div>
      </div>
      <div class="radar-compass" id="radarCompass">
        N<br>
        ▲
      </div>
      <div class="radar-bearing" id="radarBearing">
        Курс: 0°
      </div>
    </div>
    
    <div class="data-panel">
      <h3>Sailing Data</h3>
      <div class="data-row">
        <span class="label">GPS:</span>
        <span class="value" id="gpsData">Waiting...</span>
      </div>
      <div class="data-row">
        <span class="label">Wind:</span>
        <span class="value" id="windData">Waiting...</span>
      </div>
      <div class="data-row">
        <span class="label">True Wind:</span>
        <span class="value" id="trueWindData">Waiting...</span>
      </div>
      <div class="data-row">
        <span class="label">Depth:</span>
        <span class="value" id="depthData">Waiting...</span>
      </div>
      <div class="data-row">
        <span class="label">Lag:</span>
        <span class="value" id="lagData">Waiting...</span>
      </div>
    </div>
    
    <div id="status" class="status disconnected">Disconnected</div>
    
    <div class="radar-toggle" id="radarToggle">
      🔘 Режим радара
    </div>

    <script>
      const VLADIDOSTOK = [131.91523178522812, 43.123237734648214];
      let lineFeature = null;
      let points = [];
      let ws = null;
      let boatMarker = null;
      let radarMode = false;
      let currentBoatPosition = null;
      let currentBoatCourse = 0;

      function calculateBearing(lat1, lon1, lat2, lon2) {
        // Вычисление азимута между двумя точками
        const φ1 = lat1 * Math.PI / 180;
        const φ2 = lat2 * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;
        
        const y = Math.sin(Δλ) * Math.cos(φ2);
        const x = Math.cos(φ1) * Math.sin(φ2) -
                  Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
        
        let θ = Math.atan2(y, x);
        let bearing = (θ * 180 / Math.PI + 360) % 360;
        
        return bearing;
      }

      function calculateDistance(lat1, lon1, lat2, lon2) {
        // Вычисление расстояния между точками (в км)
        const R = 6371;
        const φ1 = lat1 * Math.PI / 180;
        const φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;
        
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                  Math.cos(φ1) * Math.cos(φ2) *
                  Math.sin(Δλ/2) * Math.sin(Δλ/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        
        return R * c;
      }

      function updateRadarPoints() {
        if (!currentBoatPosition || points.length === 0) return;
        
        const radarPointsDiv = document.getElementById('radarPoints');
        radarPointsDiv.innerHTML = '';
        
        // Получаем целевые точки (следующая точка активна)
        points.forEach((point, index) => {
          const pointCoord = point.coordinates || point.geometry?.coordinates;
          if (!pointCoord) return;
          
          // Вычисляем азимут от лодки к точке
          const bearing = calculateBearing(
            currentBoatPosition.lat, 
            currentBoatPosition.lon,
            pointCoord[1], 
            pointCoord[0]
          );
          
          // Вычисляем относительный угол (относительно курса лодки)
          const relativeAngle = (bearing - currentBoatCourse + 360) % 360;
          
          // Вычисляем расстояние
          const distance = calculateDistance(
            currentBoatPosition.lat, 
            currentBoatPosition.lon,
            pointCoord[1], 
            pointCoord[0]
          );
          
          // Максимальная дальность радара (10 км)
          const maxRadarRange = 10;
          const radarRadius = 40; // % от радиуса радара
          let radarDistance = (distance / maxRadarRange) * radarRadius;
          radarDistance = Math.min(radarDistance, radarRadius);
          
          // Конвертируем полярные координаты в декартовы
          const angleRad = relativeAngle * Math.PI / 180;
          const x = 50 + Math.sin(angleRad) * radarDistance;
          const y = 50 - Math.cos(angleRad) * radarDistance;
          
          const pointDiv = document.createElement('div');
          pointDiv.className = 'radar-point';
          if (index === 0) {
            pointDiv.classList.add('active');
          }
          
          pointDiv.style.left = `${x}%`;
          pointDiv.style.top = `${y}%`;
          
          // Добавляем тултип с информацией
          pointDiv.title = `Точка ${index + 1}\nАзимут: ${bearing.toFixed(1)}°\nОтн. угол: ${relativeAngle.toFixed(1)}°\nРасстояние: ${distance.toFixed(2)} км`;
          
          radarPointsDiv.appendChild(pointDiv);
        });
        
        // Обновляем информацию о курсе
        document.getElementById('radarBearing').innerHTML = `Курс: ${currentBoatCourse.toFixed(1)}°`;
      }

      function toggleRadarMode() {
        const mapDiv = document.getElementById('map');
        const radarContainer = document.getElementById('radarContainer');
        const toggleBtn = document.getElementById('radarToggle');
        
        radarMode = !radarMode;
        
        if (radarMode) {
          mapDiv.style.display = 'none';
          radarContainer.style.display = 'block';
          toggleBtn.innerHTML = '🗺️ Режим карты';
          updateRadarPoints();
        } else {
          mapDiv.style.display = 'block';
          radarContainer.style.display = 'none';
          toggleBtn.innerHTML = '🔘 Режим радара';
        }
      }

      function connectWebSocket() {
          const wsUrl = `ws://localhost:8000/ws`;
          ws = new WebSocket(wsUrl);
          
          ws.onopen = () => {
              console.log('Connected');
              document.getElementById('status').className = 'status connected';
              document.getElementById('status').textContent = 'Connected ✓';
          };
          
          ws.onmessage = (event) => {
              try {
                  const data = JSON.parse(event.data);
                
                  if (data.type === 'gps') {
                      const gps = data.data;
                      document.getElementById('gpsData').innerHTML = 
                          `${gps.lat?.toFixed(6) || '?'}°, ${gps.lon?.toFixed(6) || '?'}°`;
                      
                      if (gps.lon && gps.lat) {
                          currentBoatPosition = { lat: gps.lat, lon: gps.lon };
                          updateBoatMarker([gps.lon, gps.lat]);
                          if (radarMode) {
                            updateRadarPoints();
                          }
                      }
                  } else if (data.type === 'wind') {
                      const wind = data.data;
                      document.getElementById('windData').innerHTML = 
                          `${wind.aws || 0} м/с, ${wind.direction || 0}°`;
                  } else if (data.type === 'true_wind') {
                      const trueWind = data.data;
                      document.getElementById('trueWindData').innerHTML = 
                          `${trueWind.tws?.toFixed(1) || 0} м/с, ${trueWind.twd?.toFixed(0) || 0}°`;
                  } else if (data.type === 'depth') {
                      const depth = data.data;
                      document.getElementById('depthData').innerHTML = 
                          `${depth.depth_m || 0} м`;
                  } else if (data.type === 'lag') {
                      const lag = data.data;
                      document.getElementById('lagData').innerHTML = 
                          `${lag.speed_knots || 0} узлов`;
                      // Используем курс из данных лага или оставляем текущий
                      if (lag.course) {
                        currentBoatCourse = lag.course;
                        if (radarMode) {
                          updateRadarPoints();
                        }
                      }
                  }
              } catch (error) {
                  console.error('Error parsing message:', error);
              }
          };
          
          ws.onerror = (error) => {
              console.error('WebSocket error:', error);
              document.getElementById('status').className = 'status disconnected';
              document.getElementById('status').textContent = 'Error ✗';
          };
          
          ws.onclose = () => {
              console.log('Disconnected');
              document.getElementById('status').className = 'status disconnected';
              document.getElementById('status').textContent = 'Disconnected ✗';
              ws = null;
              
              setTimeout(connectWebSocket, 3000);
          };
      }

      async function updateBoatMarker(coordinates) {
          await ymaps3.ready;
          const { YMapDefaultMarker } = await ymaps3.import('@yandex/ymaps3-default-ui-theme');
          
          if (boatMarker) {
              map.removeChild(boatMarker);
          }
          
          boatMarker = new YMapDefaultMarker({
              coordinates: coordinates,
              color: 'red',
              size: 'micro'
          });
          map.addChild(boatMarker);
      }

      async function main() {
          await ymaps3.ready;

          const {
              YMap, 
              YMapListener, 
              YMapDefaultSchemeLayer, 
              YMapDefaultFeaturesLayer, 
              YMapControls, 
              YMapControlButton,
              YMapFeature
          } = ymaps3;

          ymaps3.import.registerCdn('https://cdn.jsdelivr.net/npm/{package}', [
              '@yandex/ymaps3-default-ui-theme@latest',
              '@yandex/ymaps3-hint@latest'
          ]);

          const {YMapDefaultMarker} = await ymaps3.import('@yandex/ymaps3-default-ui-theme');

          window.map = new YMap(
              document.getElementById('map'),
              {
                  location: {
                      center: VLADIDOSTOK,
                      zoom: 10
                  }
              }
          );

          map.addChild(new YMapDefaultSchemeLayer());
          map.addChild(new YMapDefaultFeaturesLayer());

          function updateLine() {
              if (lineFeature) {
                  map.removeChild(lineFeature);
              }
              
              if (points.length >= 2) {
                  lineFeature = new YMapFeature({
                      id: 'line',
                      geometry: {
                          type: 'LineString',
                          coordinates: points.map(p => p.coordinates || p.geometry?.coordinates)
                      },
                      style: {
                          stroke: [{width: 3, color: '#74ACFC', opacity: 0.7}]
                      }
                  });
                  map.addChild(lineFeature);
              }
          }

          function addPoint(coordinates) {
              const marker = new YMapDefaultMarker({
                  coordinates: coordinates,
                  color: 'white',
                  size: 'micro',
                  draggable: true
              });
              
              points.push(marker);
              map.addChild(marker);
              
              updateLine();
              
              if (radarMode) {
                updateRadarPoints();
              }
              
              return marker;
          }

          const clickHandler = async (object, data) => {
              if (points.length == 0 || points[points.length - 1].coordinates != object?.entity?.coordinates) {
                  addPoint(data.coordinates);
              }
          };

          const dragHandler = (object, data) => {
              if (object?.type == 'marker') {
                  updateLine();
                  if (radarMode) {
                    updateRadarPoints();
                  }
              }
          };

          const controls = new YMapControls({position: 'top right'});
          
          const center_button = new YMapControlButton({
              text: 'Владивосток',
              onClick: () => {
                  map.setLocation({
                      center: VLADIDOSTOK,
                      zoom: 10
                  });
              }
          });
          
          const clear_button = new YMapControlButton({
              text: 'Очистить',
              onClick: () => {
                  points.forEach(p => {
                      map.removeChild(p);
                  });
                  points = [];

                  if (lineFeature) {
                      map.removeChild(lineFeature);
                      lineFeature = null;
                  }
                  
                  if (radarMode) {
                    updateRadarPoints();
                  }
              }
          });
          
          controls.addChild(center_button);
          controls.addChild(clear_button);
          
          map.addChild(new YMapListener({
              layer: 'any',
              onClick: clickHandler,
              onPointerMove: dragHandler
          }));

          map.addChild(controls);
          
          // Добавляем обработчик для кнопки радара
          document.getElementById('radarToggle').addEventListener('click', toggleRadarMode);
          
          connectWebSocket();
      }

      main();
    </script>
  </body>
</html>
