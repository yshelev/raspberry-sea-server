<!DOCTYPE html>
<head>
  <title>Azimut - Map</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <script src="https://api-maps.yandex.ru/v3/?apikey=1afe9174-eb51-47c6-b797-037a783e0873&lang=ru_RU"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: monospace;
    }
    #map {
      width: 100%;
      height: 100vh;
    }
    .data-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 15px;
      color: white;
      min-width: 230px;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-family: monospace;
    }
    .data-panel h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 5px;
    }
    .data-panel .data-row {
      margin-bottom: 8px;
    }
    .data-panel .label {
      color: #aaa;
      display: inline-block;
      width: 80px;
    }
    .data-panel .value {
      color: #4ade80;
      font-weight: bold;
    }
    .status {
      position: absolute;
      top: 206px;
      left: 20px;
      z-index: 1000;
      padding: 8px 15px;
      backdrop-filter: blur(10px);
      border-radius: 10px;
      font-weight: bold;
      font-size: 14px;
      font-family: monospace;
      background: rgba(0, 0, 0, 0.8);
      color: white;
    }
    .radar-toggle {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 1000;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s;
    }
    .radar-toggle:hover {
      background: rgba(0, 0, 0, 0.9);
      border-color: #4ade80;
    }
    .radar-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: white;
      z-index: 500;
      display: none;
    }
    .radar-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vmin;
      height: 80vmin;
      border-radius: 50%;
      border: 2px solid #333;
      background: #f5f5f5;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }
    .radar-center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: #333;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .radar-points {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .radar-point {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #ff4444;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.3s;
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.3);
    }
    .radar-point.active {
      background: #ffaa00;
      box-shadow: 0 0 12px rgba(255, 170, 0, 0.8);
      width: 14px;
      height: 14px;
    }
    .radar-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }
    .radar-grid-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid #ccc;
    }
    .radar-grid-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 1px;
      height: 100%;
      background: #ccc;
      transform: translateX(-50%);
    }
    .radar-grid-line-horizontal {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background: #ccc;
      transform: translateY(-50%);
    }
  </style>
</head>

<body>
  <div id="map" style="width: 100%; height: 100vh;"></div>
  
  <div class="radar-container" id="radarContainer">
    <div class="radar-canvas" id="radarCanvas">
      <div class="radar-grid" id="radarGrid"></div>
      <div class="radar-center"></div>
      <div class="radar-points" id="radarPoints"></div>
    </div>
  </div>
  
  <div class="data-panel">
    <h3>Sailing Data</h3>
    <div class="data-row">
      <span class="label">GPS:</span>
      <span class="value" id="gpsData">Waiting...</span>
    </div>
    <div class="data-row">
      <span class="label">Wind:</span>
      <span class="value" id="windData">Waiting...</span>
    </div>
    <div class="data-row">
      <span class="label">True Wind:</span>
      <span class="value" id="trueWindData">Waiting...</span>
    </div>
    <div class="data-row">
      <span class="label">Depth:</span>
      <span class="value" id="depthData">Waiting...</span>
    </div>
    <div class="data-row">
      <span class="label">Lag:</span>
      <span class="value" id="lagData">Waiting...</span>
    </div>
  </div>
  
  <div id="status" class="status disconnected">Disconnected</div>
  
  <div class="radar-toggle" id="radarToggle">
    Режим радара
  </div>

  <script>
    const VLADIDOSTOK = [131.91523178522812, 43.123237734648214];
    
    const WAYPOINTS = [
      {"lat": 43.15893822833752, "lon": 131.87746628229846},
      {"lat": 43.13229055069301, "lon": 131.84931381647814},
      {"lat": 43.107140507737114, "lon": 131.86339004938824},
      {"lat": 43.08336414876978, "lon": 131.8399868746787},
      {"lat": 43.07480741724592, "lon": 131.8523464938193},
      {"lat": 43.11053637145254, "lon": 131.87603576383884},
      {"lat": 43.15893822833752, "lon": 131.87746628229846},
    ];
    
    let lineFeature = null;
    let points = [];
    let ws = null;
    let boatMarker = null;
    let radarMode = false;
    let currentBoatPosition = null;
    let currentBoatCourse = 0;
    let map = null;

    function drawRadarGrid() {
      const radarGrid = document.getElementById('radarGrid');
      radarGrid.innerHTML = '';
      
      const radii = [25, 50, 75];
      radii.forEach(radius => {
        const circle = document.createElement('div');
        circle.className = 'radar-grid-circle';
        circle.style.width = `${radius * 2}%`;
        circle.style.height = `${radius * 2}%`;
        circle.style.border = '1px solid #ddd';
        radarGrid.appendChild(circle);
      });
      
      const lineV = document.createElement('div');
      lineV.className = 'radar-grid-line';
      radarGrid.appendChild(lineV);
      
      const lineH = document.createElement('div');
      lineH.className = 'radar-grid-line-horizontal';
      radarGrid.appendChild(lineH);
    }

    function calculateBearing(lat1, lon1, lat2, lon2) {
      const φ1 = lat1 * Math.PI / 180;
      const φ2 = lat2 * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;
      
      const y = Math.sin(Δλ) * Math.cos(φ2);
      const x = Math.cos(φ1) * Math.sin(φ2) -
                Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
      
      let θ = Math.atan2(y, x);
      let bearing = (θ * 180 / Math.PI + 360) % 360;
      
      return bearing;
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const φ1 = lat1 * Math.PI / 180;
      const φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;
      
      const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                Math.cos(φ1) * Math.cos(φ2) *
                Math.sin(Δλ/2) * Math.sin(Δλ/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      
      return R * c;
    }

    function updateRadarPoints() {
      if (!currentBoatPosition || points.length === 0) return;
      
      const radarPointsDiv = document.getElementById('radarPoints');
      radarPointsDiv.innerHTML = '';
      
      points.forEach((point, index) => {
        const pointCoord = point.coordinates || point.geometry?.coordinates;
        if (!pointCoord) return;
        
        const bearing = calculateBearing(
          currentBoatPosition.lat, 
          currentBoatPosition.lon,
          pointCoord[1], 
          pointCoord[0]
        );
        
        const relativeAngle = (bearing - currentBoatCourse + 360) % 360;
        
        const distance = calculateDistance(
          currentBoatPosition.lat, 
          currentBoatPosition.lon,
          pointCoord[1], 
          pointCoord[0]
        );
        
        const maxRadarRange = 10;
        const radarRadius = 40;
        let radarDistance = (distance / maxRadarRange) * radarRadius;
        radarDistance = Math.min(radarDistance, radarRadius);
        
        const angleRad = relativeAngle * Math.PI / 180;
        const x = 50 + Math.sin(angleRad) * radarDistance;
        const y = 50 - Math.cos(angleRad) * radarDistance;
        
        const pointDiv = document.createElement('div');
        pointDiv.className = 'radar-point';
        if (index === 0) {
          pointDiv.classList.add('active');
        }
        
        pointDiv.style.left = `${x}%`;
        pointDiv.style.top = `${y}%`;
        
        pointDiv.title = `Точка ${index + 1}\nАзимут: ${bearing.toFixed(1)}°\nОтн. угол: ${relativeAngle.toFixed(1)}°\nРасстояние: ${distance.toFixed(2)} км`;
        
        radarPointsDiv.appendChild(pointDiv);
      });
    }

    function toggleRadarMode() {
      const mapDiv = document.getElementById('map');
      const radarContainer = document.getElementById('radarContainer');
      const toggleBtn = document.getElementById('radarToggle');
      
      radarMode = !radarMode;
      
      if (radarMode) {
        mapDiv.style.display = 'none';
        radarContainer.style.display = 'block';
        toggleBtn.innerHTML = 'Режим карты';
        drawRadarGrid();
        updateRadarPoints();
      } else {
        mapDiv.style.display = 'block';
        radarContainer.style.display = 'none';
        toggleBtn.innerHTML = 'Режим радара';
      }
    }

    function connectWebSocket() {
        const wsUrl = `ws://localhost:8000/ws`;
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            console.log('Connected');
            document.getElementById('status').className = 'status connected';
            document.getElementById('status').textContent = 'Connected ✓';
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
              
                if (data.type === 'gps') {
                    const gps = data.data;
                    document.getElementById('gpsData').innerHTML = 
                        `${gps.lat?.toFixed(6) || '?'}°, ${gps.lon?.toFixed(6) || '?'}°`;
                    
                    if (gps.lon && gps.lat) {
                        currentBoatPosition = { lat: gps.lat, lon: gps.lon };
                        updateBoatMarker([gps.lon, gps.lat]);
                        if (radarMode) {
                          updateRadarPoints();
                        }
                    }
                } else if (data.type === 'wind') {
                    const wind = data.data;
                    document.getElementById('windData').innerHTML = 
                        `${wind.aws || 0} м/с, ${wind.direction || 0}°`;
                } else if (data.type === 'true_wind') {
                    const trueWind = data.data;
                    document.getElementById('trueWindData').innerHTML = 
                        `${trueWind.tws?.toFixed(1) || 0} м/с, ${trueWind.twd?.toFixed(0) || 0}°`;
                } else if (data.type === 'depth') {
                    const depth = data.data;
                    document.getElementById('depthData').innerHTML = 
                        `${depth.depth_m || 0} м`;
                } else if (data.type === 'lag') {
                    const lag = data.data;
                    document.getElementById('lagData').innerHTML = 
                        `${lag.speed_knots || 0} узлов`;
                    if (lag.course) {
                      currentBoatCourse = lag.course;
                      if (radarMode) {
                        updateRadarPoints();
                      }
                    }
                }
            } catch (error) {
                console.error('Error parsing message:', error);
            }
        };
        
        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            document.getElementById('status').className = 'status disconnected';
            document.getElementById('status').textContent = 'Error ✗';
        };
        
        ws.onclose = () => {
            console.log('Disconnected');
            document.getElementById('status').className = 'status disconnected';
            document.getElementById('status').textContent = 'Disconnected ✗';
            ws = null;
            
            setTimeout(connectWebSocket, 3000);
        };
    }

    async function updateBoatMarker(coordinates) {
        await ymaps3.ready;
        const { YMapDefaultMarker } = await ymaps3.import('@yandex/ymaps3-default-ui-theme');
        
        if (boatMarker) {
            map.removeChild(boatMarker);
        }
        
        boatMarker = new YMapDefaultMarker({
            coordinates: coordinates,
            color: 'red',
            size: 'micro'
        });
        map.addChild(boatMarker);
    }

    function updateLine() {
        if (lineFeature) {
            map.removeChild(lineFeature);
        }
        
        if (points.length >= 2) {
            const coordinates = points.map(p => p.coordinates);
            lineFeature = new ymaps3.YMapFeature({
                id: 'line',
                geometry: {
                    type: 'LineString',
                    coordinates: coordinates
                },
                style: {
                    stroke: [{width: 3, color: '#74ACFC', opacity: 0.7}]
                }
            });
            map.addChild(lineFeature);
        }
    }

    async function addInitialPoints() {
        const { YMapDefaultMarker } = await ymaps3.import('@yandex/ymaps3-default-ui-theme');
        
        for (const wp of WAYPOINTS) {
            const marker = new YMapDefaultMarker({
                coordinates: [wp.lon, wp.lat],
                color: 'white',
                size: 'micro',
                draggable: true
            });
            
            points.push(marker);
            map.addChild(marker);
        }
        
        updateLine();
    }

    async function main() {
        await ymaps3.ready;

        const {
            YMap, 
            YMapListener, 
            YMapDefaultSchemeLayer, 
            YMapDefaultFeaturesLayer, 
            YMapControls, 
            YMapControlButton,
            YMapFeature
        } = ymaps3;

        ymaps3.import.registerCdn('https://cdn.jsdelivr.net/npm/{package}', [
            '@yandex/ymaps3-default-ui-theme@latest',
            '@yandex/ymaps3-hint@latest'
        ]);

        window.map = new YMap(
            document.getElementById('map'),
            {
                location: {
                    center: [131.87746628229846, 43.116],
                    zoom: 11
                }
            }
        );
        map = window.map;

        map.addChild(new YMapDefaultSchemeLayer());
        map.addChild(new YMapDefaultFeaturesLayer());

        function addPoint(coordinates) {
            const { YMapDefaultMarker } = ymaps3.import('@yandex/ymaps3-default-ui-theme');
            YMapDefaultMarker.then(({YMapDefaultMarker: Marker}) => {
                const marker = new Marker({
                    coordinates: coordinates,
                    color: 'white',
                    size: 'micro',
                    draggable: true
                });
                
                points.push(marker);
                map.addChild(marker);
                updateLine();
                
                if (radarMode) {
                    updateRadarPoints();
                }
            });
        }

        const clickHandler = async (object, data) => {
            if (points.length == 0 || points[points.length - 1].coordinates != object?.entity?.coordinates) {
                addPoint(data.coordinates);
            }
        };

        const dragHandler = (object, data) => {
            if (object?.type == 'marker') {
                updateLine();
                if (radarMode) {
                    updateRadarPoints();
                }
            }
        };

        const controls = new YMapControls({position: 'top right'});
        
        const center_button = new YMapControlButton({
            text: 'Владивосток',
            onClick: () => {
                map.setLocation({
                    center: VLADIDOSTOK,
                    zoom: 10
                });
            }
        });
        
        const clear_button = new YMapControlButton({
            text: 'Очистить',
            onClick: () => {
                points.forEach(p => {
                    map.removeChild(p);
                });
                points = [];

                if (lineFeature) {
                    map.removeChild(lineFeature);
                    lineFeature = null;
                }
                
                if (radarMode) {
                    updateRadarPoints();
                }
            }
        });
        
        controls.addChild(center_button);
        controls.addChild(clear_button);
        
        map.addChild(new YMapListener({
            layer: 'any',
            onClick: clickHandler,
            onPointerMove: dragHandler
        }));

        map.addChild(controls);
        
        await addInitialPoints();
        
        document.getElementById('radarToggle').addEventListener('click', toggleRadarMode);
        
        connectWebSocket();
    }

    main();
  </script>
</body>
