<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS WebSocket Client</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        #messages {
            border: 1px solid #444;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #252526;
            border-radius: 5px;
        }
        .message {
            padding: 5px;
            margin: 5px 0;
            border-bottom: 1px solid #444;
            font-size: 12px;
        }
        .status {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .connected {
            background: #0a5c2e;
            color: #fff;
        }
        .disconnected {
            background: #5c0a0a;
            color: #fff;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 3px;
        }
        button:hover {
            background: #1177bb;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 300px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
        }
    </style>
</head>
<body>
    <h1>GPS Data Client</h1>
    <div id="status" class="status disconnected">Disconnected</div>
    <div>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
        <button onclick="clearMessages()">Clear</button>
    </div>
    <div id="messages"></div>

    <script>
        let ws = null;

        function connect() {
            const wsUrl = `ws://localhost:8000/ws`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('Connected');
                document.getElementById('status').className = 'status connected';
                document.getElementById('status').textContent = 'Connected ✓';
                addMessage('System', 'Connected to WebSocket server', '#0a5c2e');
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addMessage('GPS', JSON.stringify(data, null, 2), '#0e639c');
                } catch {
                    addMessage('GPS', event.data, '#0e639c');
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addMessage('Error', 'WebSocket error occurred', '#5c0a0a');
            };
            
            ws.onclose = () => {
                console.log('Disconnected');
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('status').textContent = 'Disconnected ✗';
                addMessage('System', 'Disconnected from server', '#5c0a0a');
                ws = null;
            };
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
        
        function addMessage(sender, text, color = '#d4d4d4') {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            const timestamp = new Date().toLocaleTimeString();
            messageDiv.innerHTML = `<strong style="color: ${color}">[${timestamp}] ${sender}:</strong><br/>${text}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }
        
        // Auto-connect on page load
        window.onload = () => {
            setTimeout(connect, 1000);
        };
    </script>
</body>
</html>
